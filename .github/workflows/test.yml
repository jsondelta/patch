name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1
      - run: make build
      - run: npm test
